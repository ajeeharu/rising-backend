name: Deploy Laravel

on:
  push:
    branches:
      - main  # 任意のブランチに変更可能
    workflow_dispatch: # これを追加！内容（インデント等）は空でOK
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # 環境に合わせて変更
    # Node.jsのセットアップ（Viteやnpm run build用）
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'


      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      # 1. ファイルの転送 (rsync)
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: "/home/users/0/main.jp-web-server/web/rising/backend" # サーバー上のパス
          EXCLUDE: "/node_modules/, /vendor/, /storage/, .env"

      # 2. リモートサーバーでコマンド実行 (Migration)
      - name: Execute Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/users/0/main.jp-web-server/web/rising/backend
            mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions
            chmod -R 777 storage bootstrap/cache

            # 1. サーバー側でライブラリをインストール（phpのパスに注意）
            # ロリポップには composer コマンドが標準で用意されています
            /usr/local/php/8.4/bin/php /usr/local/php/8.4/bin/composer install --no-dev --optimize-autoloader

            # 2. マイグレーションの実行
            /usr/local/php/8.4/bin/php artisan migrate --force

            # 3. キャッシュのクリア（反映を確実にするため）
            /usr/local/php/8.4/bin/php artisan config:cache
            /usr/local/php/8.4/bin/php artisan route:cache
